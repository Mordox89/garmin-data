name: AI Feedback
on:
  push:
    branches: [main]
    paths:
      - 'data.json'
  workflow_dispatch:
concurrency:
  group: main-branch
  cancel-in-progress: false
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  ai-feedback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install anthropic
      - name: Generate coach rapport
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python build_coach_report.py
      - name: Commit data.json
        run: |
          git config user.name  "telemetry-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "Geen wijzigingen" && exit 0
          git commit -m "Coach rapport: $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: ai-feedback
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deployment
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment